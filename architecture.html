            fontFamily: {
                'raleway': ['Libre Baskerville', 'serif'],

<style>
body { margin:0; overflow:hidden; }

/* Horizontal slider */
.slider {
  display:flex;
  width:300vw;
  height:100vh;
  transition:transform 0.6s ease;
}

.slide {
  width:100vw;
  height:100vh;
  background-size:cover;
  background-position:center;
}

/* arrows */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:30px;
  color:white;
  cursor:pointer;
  opacity:0.6;
  z-index:20;
}
.arrow:hover { opacity:1; }
.left { left:25px; }
.right { right:25px; }
</style>
</head>

<body>

<!-- HEADER IDENTICO ALLA HOMEPAGE -->
<header class="fixed top-0 left-0 right-0 z-50 bg-transparent">
<nav class="max-w-screen-2xl mx-auto px-3 py-8">

<!-- LOGO -->
<div class="flex-shrink-0">
<a href="index.html"
class="text-white font-raleway text-xl md:text-3xl font-medium hover:opacity-80 transition-opacity duration-300"
style="font-weight: 550;">
ANDREA AIMAR
</a>
</div>

<!-- MENU DESKTOP -->
<div class="hidden md:flex items-center space-x-10">

<a href="reportage.html"
class="text-white font-raleway text-xs uppercase tracking-wider py-4 border-b border-transparent hover:border-white transition-all duration-300">
REPORTAGE
</a>

<a href="events.html"
class="text-white font-raleway text-xs uppercase tracking-wider py-4 border-b border-transparent hover:border-white transition-all duration-300">

</a>

<a href="architecture.html"
class="text-white font-raleway text-xs uppercase tracking-wider py-4 border-b border-white transition-all duration-300">
ARCHITECTURE
</a>

<a href="about.html"
class="text-white font-raleway text-xs uppercase tracking-wider py-4 border-b border-transparent hover:border-white transition-all duration-300">
ABOUT
</a>

</div>

<!-- MOBILE -->
<div class="md:hidden">
<button id="mobile-menu-btn" class="text-white focus:outline-none">
<div class="hamburger-menu">
<span class="block w-6 h-0.5 bg-white mb-1"></span>
<span class="block w-6 h-0.5 bg-white mb-1"></span>

</div>
</button>

<!-- MOBILE MENU -->

<a href="reportage.html" class="block text-black font-raleway text-sm uppercase tracking-wider py-3">REPORTAGE</a>
<a href="events.html" class="block text-black font-raleway text-sm uppercase tracking-wider py-3">EVENTS</a>
<a href="live-music.html" class="block text-black font-raleway text-sm uppercase tracking-wider py-3">LIVE MUSIC</a>
<a href="architecture.html" class="block text-black font-raleway text-sm uppercase tracking-wider py-3">ARCHITECTURE</a>

</div>
</div>

</header>

<!-- SLIDER -->
<div id="slider" class="slider">

<div class="slide" style="background-image:url('photos/architecture/guochang-temple-1.jpg')"></div>
<div class="slide" style="background-image:url('photos/architecture/guochang-temple-2.jpg')"></div>
<div class="slide" style="background-image:url('photos/architecture/guochang-temple-3.jpg')"></div>

</div>

<div class="arrow left" onclick="prev()">‹</div>
<div class="arrow right" onclick="next()">›</div>

<script>
let index = 0;
const slider = document.getElementById("slider");

function update(){
  slider.style.transform = "translateX(-" + (index * 100) + "vw)";
}

function next(){
  if(index < 2){
    index++;
    update();
  }
}

function prev(){
  if(index > 0){
    index--;
    update();
  }
}

/* mobile menu */
document.getElementById('mobile-menu-btn').addEventListener('click', function () {
    const mobileMenu = document.getElementById('mobile-menu');
    mobileMenu.classList.toggle('hidden');
});
</script>

</body>
